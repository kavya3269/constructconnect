<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConstructConnect - Sign In</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="brand">
      <div class="brand-symbol" aria-hidden="true">🏗️</div>
      <div class="brand-info">
        <h1 class="brand-name">ConstructConnect</h1>
        <p class="brand-tagline">Professional Construction Management</p>
      </div>
    </div>

    <div class="auth-card large">
      <h2 class="auth-title">Sign in</h2>
      <form id="loginForm" class="auth-form">
        <label class="field">
          <span>Email</span>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />
        </label>

        <label class="field">
          <span>Password</span>
          <div class="password-wrap">
            <input type="password" id="password" name="password" placeholder="••••••••" required />
            <button type="button" id="togglePassword" class="icon-btn" aria-label="Show password">👁️</button>
          </div>
        </label>

        <button type="submit" class="primary-btn">Sign in</button>
      </form>

      <div class="auth-links">
        <button id="openForgot" class="link-btn">Forgot password?</button>
        <span>•</span>
        <button id="openCreate" class="link-btn">Create account</button>
      </div>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div id="forgotModal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Password recovery</h3>
        <button class="icon-btn close-modal" data-close="forgotModal">✕</button>
      </div>
      <form id="forgotForm" class="modal-form">
        <label class="field">
          <span>Recovery email</span>
          <input type="email" id="forgotEmail" placeholder="you@example.com" required />
        </label>
        <button type="submit" class="primary-btn">Send</button>
      </form>
    </div>
  </div>

  <!-- Create Account Modal -->
  <div id="createModal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Create your account</h3>
        <button class="icon-btn close-modal" data-close="createModal">✕</button>
      </div>
      <form id="createForm" class="modal-form">
        <div class="grid">
          <label class="field">
            <span>First name</span>
            <input type="text" id="firstName" required />
          </label>
          <label class="field">
            <span>Last name</span>
            <input type="text" id="lastName" required />
          </label>
        </div>
        <label class="field">
          <span>Phone</span>
          <input type="tel" id="phone" placeholder="+1 555 123 4567" />
        </label>
        <label class="field">
          <span>Email</span>
          <input type="email" id="createEmail" required />
        </label>
        <label class="field">
          <span>Password</span>
          <input type="password" id="createPassword" required />
        </label>
        <button type="submit" class="primary-btn">Create account</button>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/app.js"></script>
  <script>
    // Prefill demo credentials for convenience
    window.addEventListener('DOMContentLoaded', () => {
      const email = document.getElementById('email');
      const password = document.getElementById('password');
      if (email && password && !email.value) {
        email.value = 'manager@constructconnect.com';
        password.value = 'Password123!';
      }
    });
  </script>
</body>
</html>
